version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
    - ineffassign
    - unused
    - bodyclose
    - noctx
    - gocritic
    - revive
    - errorlint
    - wrapcheck
    - gocognit
    - nestif
    - prealloc
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
        - (io.Closer).Close
        - (*github.com/pkg/sftp.Client).Close
        - (*golang.org/x/crypto/ssh.Client).Close
        - (*golang.org/x/crypto/ssh.Session).Close
    gocognit:
      min-complexity: 15
    nestif:
      min-complexity: 5
    wrapcheck:
      ignore-sigs:
        - .Errorf(
        - errors.New(
        - errors.Unwrap(
        - errors.Join(

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/webcane/docker-deploy

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
