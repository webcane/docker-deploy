version: "2"

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - staticcheck

settings:
  errcheck:
    exclude-functions:
      - fmt.Fprintf
      - fmt.Fprintln
      - fmt.Fprint
      - (io.Closer).Close
      - (*github.com/pkg/sftp.Client).Close
      - (*golang.org/x/crypto/ssh.Client).Close
      - (*golang.org/x/crypto/ssh.Session).Close

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/webcane/docker-deploy

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
