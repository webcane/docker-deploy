version: 2

builds:
  - main: ./cmd/docker-deploy
    binary: docker-deploy
    ldflags:
      - -s
      - -w
      - -X main.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: ["tar.gz"]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

brews:
  - name: docker-deploy
    repository:
      owner: webcane
      name: homebrew-docker-deploy
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: goreleaser-bot
      email: goreleaser-bot@webcane.dev
    homepage: "https://github.com/webcane/docker-deploy"
    description: "Deploy a docker-compose project to a remote VPS via SSH — no git required on the remote"
    license: "MIT"
    install: |
      bin.install "docker-deploy"
    post_install: |
      cli_plugins = Pathname.new("#{Dir.home}/.docker/cli-plugins")
      cli_plugins.mkpath
      target = "#{cli_plugins}/docker-deploy"
      src = "#{opt_bin}/docker-deploy"
      File.delete(target) if File.symlink?(target)
      begin
        File.symlink(src, target)
      rescue Errno::EPERM
        opoo "Could not create symlink automatically. Run manually:\n" \
             "  ln -sf #{opt_bin}/docker-deploy ~/.docker/cli-plugins/docker-deploy"
      end
    custom_block: |
      def sandbox_allowlist?
        true
      end

      def uninstall
        symlink = File.expand_path("~/.docker/cli-plugins/docker-deploy")
        File.delete(symlink) if File.exist?(symlink)
      end
    test: |
      system "#{bin}/docker-deploy", "docker-cli-plugin-metadata"

release:
  draft: false

snapshot:
  version_template: "{{ .Tag }}-next"
