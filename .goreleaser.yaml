version: 2

builds:
  - main: ./cmd/docker-deploy
    binary: docker-deploy
    ldflags:
      - -s
      - -w
      - -X main.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: ["tar.gz"]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

brews:
  - name: docker-deploy
    repository:
      owner: webcane
      name: homebrew-docker-deploy
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: goreleaser-bot
      email: goreleaser-bot@webcane.dev
    homepage: "https://github.com/webcane/docker-deploy"
    description: "Deploy a docker-compose project to a remote VPS via SSH — no git required on the remote"
    license: "MIT"
    install: |
      bin.install "docker-deploy"
      (lib/"docker/cli-plugins").install_symlink bin/"docker-deploy"
    post_install: |
      plugins_dir = "#{Dir.home}/.docker/cli-plugins"
      system "mkdir", "-p", plugins_dir
      target = "#{plugins_dir}/docker-deploy"
      File.delete(target) if File.symlink?(target)
      system "ln", "-sf", "#{opt_bin}/docker-deploy", target
    custom_block: |
      def uninstall
        target = "#{Dir.home}/.docker/cli-plugins/docker-deploy"
        File.delete(target) if File.exist?(target)
      end
    caveats: |
      docker-deploy is installed as a Docker CLI plugin.

      Symlinks created automatically:
        #{HOMEBREW_PREFIX}/lib/docker/cli-plugins/docker-deploy
        ~/.docker/cli-plugins/docker-deploy

      If the ~/.docker symlink was not created, run:
        ln -sf #{opt_bin}/docker-deploy ~/.docker/cli-plugins/docker-deploy
    test: |
      system "#{bin}/docker-deploy", "docker-cli-plugin-metadata"

release:
  draft: false

snapshot:
  version_template: "{{ .Tag }}-next"
