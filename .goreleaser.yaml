version: 2

builds:
  - main: ./cmd/docker-deploy
    binary: docker-deploy
    ldflags:
      - -s
      - -w
      - -X main.version={{.Version}}
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats: ["tar.gz"]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

release:
  draft: false

snapshot:
  version_template: "{{ .Tag }}-next"
