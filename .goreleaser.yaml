version: 2

builds:
  - main: ./cmd/docker-deploy
    binary: docker-deploy
    ldflags:
      - -s
      - -w
      - -X main.version={{.Version}}
      - -X main.gitCommit={{.ShortCommit}}
      - -X main.buildTime={{.Date}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

brews:
  - name: docker-deploy
    repository:
      owner: webcane
      name: homebrew-docker-deploy
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: goreleaser-bot
      email: goreleaser-bot@webcane.dev
    homepage: "https://github.com/webcane/docker-deploy"
    description: "Deploy a docker-compose project to a remote VPS via SSH — no git required on the remote"
    license: "MIT"
    install: |
      bin.install "docker-deploy"
      (lib/"docker/cli-plugins").install_symlink bin/"docker-deploy"
    custom_block: |
      def caveats
        return if Hardware::CPU.intel?

        <<~EOS
          Apple Silicon: Docker does not search #{HOMEBREW_PREFIX}/lib/docker/cli-plugins by default.
          Make the plugin visible via one of:

          Option 1 — symlink into your CLI plugins directory:
            mkdir -p ~/.docker/cli-plugins
            ln -sf #{opt_bin}/docker-deploy ~/.docker/cli-plugins/docker-deploy

          Option 2 — add Homebrew's plugin directory to ~/.docker/config.json:
            "cliPluginsExtraDirs": ["#{HOMEBREW_PREFIX}/lib/docker/cli-plugins"]
        EOS
      end
    test: |
      system "#{bin}/docker-deploy", "docker-cli-plugin-metadata"

release:
  draft: false

snapshot:
  name_template: "{{ .Tag }}-next"
